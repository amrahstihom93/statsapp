{% extends "core/base_accounts.html" %}

{% block title %}Sign up - SIGMA{% endblock %}

{% block content %}
<form method="post" novalidate class="auth-form">
	{% csrf_token %}
	
	<h3 style="font-family: 'Archivo Black', sans-serif; margin-bottom: 40px; font-weight: 400; font-size: 3rem; letter-spacing: 1px;">Join<br>Sigma.</h3>

	{% include "core/includes/form.html" %}

	<button type="submit" class="btn-accent hover-target">Initialize Account</button>
	
	<div class="auth-footer">
		Already have an account? <a href="{% url 'login' %}" class="hover-target">Log In</a>
	</div>
</form>
{% endblock %}
