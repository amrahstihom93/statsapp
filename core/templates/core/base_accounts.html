{% extends "core/base.html" %}
{% load static %}

{% block stylesheet %}
<style>
	@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Archivo+Black&display=swap');

	:root {
		--bg-color: #ffffff;
		--text-main: #050505;
		--text-muted: #6b7280;
		--accent: #99cc00;
		--accent-hover: #b3e600;
		--auth-left-bg: #f3f4f6;
		--auth-right-bg: #ffffff;
		--border-color: rgba(0, 0, 0, 0.1);
		--input-border: rgba(0, 0, 0, 0.2);
	}

	[data-theme="dark"] {
		--bg-color: #050505;
		--text-main: #f4f4f5;
		--text-muted: #a1a1aa;
		--accent: #ccff00;
		--accent-hover: #b3e600;
		--auth-left-bg: #050505;
		--auth-right-bg: #0a0a0a;
		--border-color: rgba(255, 255, 255, 0.05);
		--input-border: rgba(255, 255, 255, 0.2);
	}

	html, body {
		margin: 0; padding: 0;
		background-color: var(--bg-color) !important;
		color: var(--text-main);
		font-family: 'Inter', sans-serif;
		min-height: 100vh;
		cursor: none;
	}
	h1, h2, h3, h4, .brand-logo { font-family: 'Archivo Black', sans-serif; font-weight: 400; letter-spacing: 1px; }
	a, button { cursor: none; }

	/* Custom Cursor */
	.cursor-dot, .cursor-outline {
		position: fixed; top: 0; left: 0; transform: translate(-50%, -50%);
		border-radius: 50%; z-index: 9999; pointer-events: none;
	}
	.cursor-dot { width: 8px; height: 8px; background-color: var(--accent); }
	.cursor-outline {
		width: 40px; height: 40px; border: 1px solid rgba(204, 255, 0, 0.5);
		transition: width 0.2s, height 0.2s, background-color 0.2s;
	}
	body.cursor-hover .cursor-outline {
		width: 60px; height: 60px; background-color: rgba(204, 255, 0, 0.1); border-color: transparent;
	}

	/* Background Mesh */
	.auth-bg {
		position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
		z-index: -1; overflow: hidden; background: var(--auth-left-bg);
	}
	.mesh-blob {
		position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.5;
		animation: float 20s infinite ease-in-out;
	}
	.blob-1 {
		width: 600px; height: 600px; background: radial-gradient(circle, rgba(204,255,0,0.15) 0%, rgba(0,0,0,0) 70%);
		top: -100px; left: -100px;
	}
	.blob-2 {
		width: 800px; height: 800px; background: radial-gradient(circle, rgba(50,50,255,0.1) 0%, rgba(0,0,0,0) 70%);
		bottom: -200px; right: -200px; animation-delay: -5s;
	}
	@keyframes float {
		0%, 100% { transform: translate(0, 0) scale(1); }
		33% { transform: translate(30px, -50px) scale(1.1); }
		66% { transform: translate(-20px, 20px) scale(0.9); }
	}

	/* Modern Split Screen Layout */
	.auth-layout {
		display: flex;
		min-height: 100vh;
		width: 100vw;
	}
	
	.auth-left {
		flex: 1;
		background: var(--auth-left-bg);
		position: relative;
		overflow: hidden;
		display: flex;
		flex-direction: column;
		justify-content: center;
		padding: 40px;
	}
	
	.auth-right {
		flex: 1;
		background: var(--auth-right-bg);
		display: flex;
		flex-direction: column;
		justify-content: center;
		padding: 10%;
		border-left: 1px solid var(--border-color);
	}

	.auth-left-content {
		z-index: 2;
		max-width: 600px;
		margin: 0 auto;
	}

	.auth-quote {
		font-family: 'Archivo Black', sans-serif;
		font-size: clamp(2.5rem, 5vw, 4rem);
		font-weight: 800;
		line-height: 1.1;
		margin-bottom: 20px;
		color: var(--text-main);
	}

	.auth-quote span {
		color: var(--accent);
	}

	/* Form Elements Modernization */
	.auth-form-container {
		width: 100%;
		max-width: 450px;
		margin: 0 auto;
	}

	.brand-logo {
		font-size: 2rem; font-weight: 800; margin-bottom: 40px; letter-spacing: -1px;
	}
	.brand-logo a { color: var(--text-main); text-decoration: none; }
	.brand-logo a:hover { color: var(--accent); }
	
	.auth-right .form-group {
		margin-bottom: 25px;
		position: relative;
	}

	.auth-right .form-group label {
		display: block;
		color: var(--text-muted); 
		font-size: 0.85rem; 
		text-transform: uppercase;
		letter-spacing: 1px;
		margin-bottom: 8px; 
		font-weight: 600;
	}

	.auth-right .form-control {
		background: transparent !important;
		border: none !important;
		border-bottom: 2px solid var(--input-border) !important;
		color: var(--text-main) !important;
		border-radius: 0;
		padding: 15px 0;
		font-size: 1.2rem;
		transition: border-color 0.3s;
	}

	.auth-right .form-control:focus {
		border-bottom-color: var(--accent) !important;
		box-shadow: none !important;
		background: transparent !important;
	}

	.btn-accent {
		background-color: var(--accent); color: #000; padding: 18px 30px;
		border-radius: 0px; font-weight: 700; font-family: 'Archivo Black', sans-serif; font-size: 1.2rem;
		border: none; width: 100%; margin-top: 30px; transition: transform 0.3s, background-color 0.3s;
		text-transform: uppercase;
		letter-spacing: 1px;
	}
	.btn-accent:hover {
		background-color: var(--accent-hover); transform: translateY(-3px); color: #000;
	}
	.auth-footer {
		margin-top: 30px; color: var(--text-muted); font-size: 0.95rem; text-align: left;
	}
	.auth-footer a { color: var(--accent); font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; transition: color 0.3s; }
	.auth-footer a:hover { color: var(--text-main); text-decoration: none; }

	@media (max-width: 992px) {
		.auth-layout { flex-direction: column; }
		.auth-left { display: none; }
		.auth-right { padding: 5%; }
	}
</style>
{% endblock %}

{% block body %}
	<!-- Custom Cursor -->
	<div class="cursor-dot"></div>
	<div class="cursor-outline"></div>

	<!-- Split Layout -->
	<div class="auth-layout">
		<!-- Left Side (Visual) -->
		<div class="auth-left">
			<div class="mesh-blob blob-1"></div>
			<div class="mesh-blob blob-2"></div>
			<div class="auth-left-content">
				<div class="auth-quote">
					Precision.<br>
					Analytics.<br>
					<span>Redefined.</span>
				</div>
				<p style="color: var(--text-muted); font-size: 1.2rem; max-width: 400px; line-height: 1.6;">
					Access the most powerful statistical engine designed for modern data alchemy.
				</p>
			</div>
		</div>

		<!-- Right Side (Form) -->
		<div class="auth-right">
			<div class="auth-form-container">
				<div class="brand-logo" style="display: flex; justify-content: space-between; align-items: center;">
					<a href="{% url 'home' %}" class="hover-target">SIGMA.</a>
					<button onclick="toggleTheme()" class="hover-target" style="background: transparent; border: none; color: var(--text-main); font-size: 1.2rem;" title="Toggle Theme">
						<i id="theme-toggle-icon-auth" class="fas fa-sun"></i>
					</button>
				</div>
				<script>
					// Set initial icon for auth page
					if (document.documentElement.getAttribute('data-theme') === 'light') {
						document.getElementById('theme-toggle-icon-auth').className = 'fas fa-moon';
					}
					// Override toggleTheme in this scope to also update this specific icon if they click it
					const originalToggle = window.toggleTheme;
					window.toggleTheme = function() {
						originalToggle();
						const currentTheme = document.documentElement.getAttribute('data-theme');
						const icon = document.getElementById('theme-toggle-icon-auth');
						if(icon) {
							icon.className = currentTheme === 'dark' ? 'fas fa-sun' : 'fas fa-moon';
						}
					};
				</script>
				{% block content %}
				{% endblock %}
			</div>
		</div>
	</div>

	<!-- Custom Cursor Script -->
	<script>
		document.addEventListener('DOMContentLoaded', () => {
			const cursorDot = document.querySelector('.cursor-dot');
			const cursorOutline = document.querySelector('.cursor-outline');
			window.addEventListener('mousemove', (e) => {
				const posX = e.clientX; const posY = e.clientY;
				cursorDot.style.left = `${posX}px`; cursorDot.style.top = `${posY}px`;
				cursorOutline.animate({ left: `${posX}px`, top: `${posY}px` }, { duration: 500, fill: "forwards" });
			});
			const hoverTargets = document.querySelectorAll('a, button, input, .hover-target');
			hoverTargets.forEach(target => {
				target.addEventListener('mouseenter', () => document.body.classList.add('cursor-hover'));
				target.addEventListener('mouseleave', () => document.body.classList.remove('cursor-hover'));
			});
		});
	</script>
{% endblock %}
